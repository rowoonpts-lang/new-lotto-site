# 데이터베이스의 사용자 필드추가 옵션
# 생성할 필드명과 데이터 타입 및 옵션 사이엔 스페이스로 구분해 줘야 한다.
# 아래 예와 같이 설정을 하면 2개의 필드가가 생성되며
# 테이블 맨 마지막에 Etc1, Etc2 필드가 추가된다.
# 예) db_field=Etc1 Varchar(10)
#     db_field=Etc2 Varchar(10)
#-----------------------------------------------------
#
#db_field=Etc1 Varchar(100)
#db_field=Etc2 Varchar(100)
#
#
#-----------------------------------------------------
# 데이터베이스의 사용자 인덱스추가 옵션
# 생성할 인덱스의 필드와 필드 사이는 콤마로 구분해 줘야 하며
# 정렬( 오름차순:ASC, 내림차순:DESC) 도 설정할 수 있다.
# 아래 예와 같이 설정을 하면 2개의 인덱스가 생성되며
# 인덱스 명은 "Ix_테이블명_순서"로 생성이된다.
# 예) db_index=Etc1 Asc
#     db_index=Etc2 Desc
#-----------------------------------------------------
#
#db_index=Etc1 Desc
#db_index=Etc2 Asc
#
#
#-----------------------------------------------------
# 로그테이블을 Msg_Log_YYYYMM 형태로 여러 개를 할 것인지
# Msg_Log 하나로 할 것인지 선택 모드(기본 : default)
# default : 로그테이블을 기존 방식과 같이 매년매월로 나누어 생성함.
# one : 로그테이블을 Msg_Log 테이블로 하나만 생성함.
# 예) log_make_mode=default
#	  log_make_mode=one
#-----------------------------------------------------
#
log_make_mode=default
#
#
#-----------------------------------------------------
# 사용자 스팸 사용구분
# 0.아니요 : 스팸테이블에 등록된 전화번호를
#            차단하지않고 발송
# 1.예 : 스팸테이블에 등록된 전화번호를 발송하지 않고
#        차단함 
# 예) use_spam=1
#-----------------------------------------------------
#
use_spam=1
#
#
#-----------------------------------------------------
# 그룹별 스팸 적용
# 0.아니요 : Deny_No와 상관없이 스팸 전화번호만 일치하면 차단
# 1.예 : 발송 테이블의 Deny_No와 스팸테이블의 Deny_No가 
# 일치하는 전화번호에 대해서 스팸차단
# 0.아니요 1.예
# 예) group_spam=1
#-----------------------------------------------------
#
group_spam=1
#
#
#-----------------------------------------------------
# 사용자스팸 조회간격(분)
# 예) user_spam_search_interval=30
#-----------------------------------------------------
#
user_spam_search_interval=30
#
#
#-----------------------------------------------------
# 로그파일 보관일수(일)
# 예) logfile_keep_days=7
#-----------------------------------------------------
#
logfile_keep_days=7
#
#
#-----------------------------------------------------
# 접속이 종료됐을때 재시작 간격(초)
# 예) restart_interval=30
#-----------------------------------------------------
#
restart_interval=30
#
#
#-----------------------------------------------------
# 발송데이터 조회 간격(초)
# 예) tran_data_search_interval=1
#-----------------------------------------------------
#
tran_data_search_interval=1
#
#
#-----------------------------------------------------
# 한번에 조회할 레코드의 수
# 예) tran_data_select_count=1000
#-----------------------------------------------------
#
tran_data_select_count=1000
#
#
#-----------------------------------------------------
# 레포트 로그테이블 이동
# 0.아니요 1.예
# 예) report_move=1
#-----------------------------------------------------
#
report_move=1
#
#
#-----------------------------------------------------
# 레포트 배치 간격(초)
# 배치간격이 너무 크면 발송량에 따라 쿼리 타임아웃이 발생됨
# report_move=0 일때는 배치처리가 안됨
# 예) report_batch_inverval=10
#-----------------------------------------------------
#
report_batch_inverval=10
